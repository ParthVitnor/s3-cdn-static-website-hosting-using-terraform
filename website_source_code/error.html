<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Terraform Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f1117;
      --bg2:    #161b27;
      --bg3:    #1e2536;
      --border: #2a3450;
      --text:   #cdd6f4;
      --muted:  #6e7ea8;
      --accent: #7c3aed;
      --red:    #ef4444;
      --white:  #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .error-wrap {
      max-width: 480px;
      width: 100%;
      animation: fadeUp 0.5s ease both;
    }

    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(5rem, 18vw, 8rem);
      font-weight: 600;
      color: var(--bg3);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -4px;
      position: relative;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.15;
    }

    .terminal-box {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin: 24px 0;
      text-align: left;
    }

    .terminal-bar {
      background: var(--bg3);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ef4444; }
    .dot-y { background: #f59e0b; }
    .dot-g { background: #22c55e; }

    .terminal-body {
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.8;
    }

    .t-prompt { color: #22c55e; }
    .t-cmd    { color: #cdd6f4; }
    .t-error  { color: #ef4444; }
    .t-hint   { color: #6e7ea8; }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }

    p {
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-home {
      background: var(--accent);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      border: none;
      cursor: pointer;
      display: inline-block;
    }

    .btn-home:hover { background: #6d28d9; transform: translateY(-1px); }

    .btn-back {
      background: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-back:hover { border-color: var(--accent); color: var(--white); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="error-wrap">

    <div class="error-code">404</div>

    <h1>Page Not Found</h1>
    <p>Looks like this page doesn't exist — or was destroyed with <code style="background:#1e2536;border:1px solid #2a3450;padding:1px 6px;border-radius:4px;font-size:0.85em;color:#c084fc;">terraform destroy</code>.</p>

    <div class="terminal-box">
      <div class="terminal-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <div class="terminal-body">
        <div><span class="t-prompt">$ </span><span class="t-cmd">terraform plan</span></div>
        <div class="t-error">Error: Resource "page" not found</div>
        <div>&nbsp;</div>
        <div class="t-hint">│ The page you are looking for does not</div>
        <div class="t-hint">│ exist in the current state file.</div>
        <div>&nbsp;</div>
        <div class="t-hint">│ Suggestion: Navigate back to the homepage.</div>
      </div>
    </div>

    <div class="actions">
      <a href="index.html" class="btn-home">← Back to Home</a>
      <button class="btn-back" onclick="history.back()">Go Back</button>
    </div>

  </div>
</body>
</html>
